name: Deploy Worker

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Worker/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.PROJECT_NAME }}-worker
  CLUSTER_NAME: ${{ vars.PROJECT_NAME }}-eks
  ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  PROJECT_PATH: Worker/Fibonacci
  AWS_ROLE: ${{ vars.PROJECT_NAME }}-worker-role

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: TCCMbaUsp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AWS Auth
        uses: ./.github/actions/aws-auth
        with:
          role-to-assume: arn:aws:iam::$ACCOUNT_ID:role/$AWS_ROLE
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Gerando versão da Imagem
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG $PROJECT_PATH
          
      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Image
        run: |
          docker push \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --name $CLUSTER_NAME \
          --region $AWS_REGION

      - name: Apply Configmap
        run: |
          kubectl apply -f Worker/Kubernetes/worker-configmap.yaml

      - name: Substitute AWS Account ID
        env:
          AWS_ACCOUNT_ID: ${{ env.ACCOUNT_ID }}
          AWS_ROLE: ${{ env.AWS_ROLE }}
          
        run: |
          envsubst < Worker/Kubernetes/worker-sqs-sa.yaml > Worker/Kubernetes/worker-sqs-sa-processed.yaml

      - name: Apply ServiceAccount to Kubernetes
        run: |
          kubectl apply -f Worker/Kubernetes/worker-sqs-sa-processed.yaml

      - name: Deploy Kubernetes
        run: |
          kubectl apply -f Worker/Kubernetes/worker-deployment.yaml
          kubectl set image deployment/sqs-worker-low-load worker=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
          kubectl rollout status deployment/sqs-worker-low-load