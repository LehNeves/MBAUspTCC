name: Deploy Worker

on:
  push:
    branches: [ "main" ]
    paths:
      - 'worker/FibonacciWorker/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.PROJECT_NAME }}-worker
  CLUSTER_NAME: tcc-eks-cluster
  IMAGE_TAG: latest
  ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  PROJECT_PATH: Worker/Fibonacci

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: TCCMbaUsp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: AWS Auth
        uses: ./.github/actions/aws-auth
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_GITHUB_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG $PROJECT_PATH
          
      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Image
        run: |
          docker push \
          $ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --name $CLUSTER_NAME \
          --region $AWS_REGION

      - name: Apply Configmap
        run: |
          kubectl apply -f Worker/Kubernetes/worker-configmap.yaml

      - name: Deploy Kubernetes
        run: |
          kubectl apply -f Worker/Kubernetes/worker-deployment.yaml